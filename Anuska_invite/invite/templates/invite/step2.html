{% extends 'invite/base.html' %}
{% block title %}📚 The Question{% endblock %}

{% block content %}
<div class="card">
  <div class="step-indicator">
    <div class="step-dot done"></div>
    <div class="step-dot active"></div>
    <div class="step-dot"></div>
    <div class="step-dot"></div>
    <div class="step-dot"></div>
  </div>

  <span class="emoji-big">📚</span>
  <h2>The Big Question</h2>
  <p class="subtitle">
    Will you come to library<br>
    and study with me?
  </p>

  <form method="POST" action="{% url 'step2' %}">
    {% csrf_token %}
    <div class="btn-row">
      <button type="submit" name="answer" value="yes" class="btn btn-yes">
        YES 😄
      </button>
      <button type="submit" name="answer" value="no" class="btn btn-no">
        NO 😶
      </button>
    </div>
  </form>

  <p class="footer-hint">Think carefully. This is very scientific 🔬</p>
</div>
{% endblock %}
